<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yami Control</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; padding: 20px; background: #14141a; color: #f4f4f6; font: 16px system-ui, sans-serif; }
    main { max-width: 560px; margin: auto; }
    h1 { font-size: 24px; margin: 0 0 18px; }
    button { width: 100%; margin: 6px 0; padding: 13px; border: 0; border-radius: 10px; background: #343441; color: inherit; font: inherit; }
    button.danger { background: #71323c; }
    #status { min-height: 24px; margin: 14px 0; color: #b9b9c7; white-space: pre-wrap; }
  </style>
</head>
<body>
  <main>
    <h1>Yami Control</h1>
    <div id="status">панель готова</div>
    <button data-action="media_status">Проверить лимит медиа</button>
    <button data-action="new_session">Начать чистую сессию</button>
    <button data-action="trace">Показать последнюю трассировку</button>
    <button class="danger" data-action="full_wipe">Полный сброс</button>
  </main>
  <script>
    const app = window.Telegram?.WebApp;
    app?.ready();
    app?.expand();
    document.querySelectorAll("button[data-action]").forEach((button) => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        document.querySelector("#status").textContent = "отправляю...";
        if (!app) {
          document.querySelector("#status").textContent = "открой панель из Telegram";
          return;
        }
        app.sendData(JSON.stringify({ action }));
      });
    });
  </script>
</body>
</html>
