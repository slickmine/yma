<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yami Control Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #0d0d12;
      --panel-bg: rgba(22, 22, 30, 0.75);
      --accent-color: #00e5ff;
      --danger-color: #ff3366;
      --text-main: #f4f4f6;
      --text-muted: #8e8e9f;
      --border-color: rgba(0, 229, 255, 0.15);
    }
    body {
      margin: 0;
      padding: 20px;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    main {
      width: 100%;
      max-width: 480px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #fff 30%, var(--accent-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    button {
      width: 100%;
      margin: 10px 0;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-main);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-sizing: border-box;
    }
    button:hover {
      background: rgba(0, 229, 255, 0.1);
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.25);
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
    }
    button.danger {
      color: var(--danger-color);
      border-color: rgba(255, 51, 102, 0.15);
    }
    button.danger:hover {
      background: rgba(255, 51, 102, 0.1);
      border-color: var(--danger-color);
      box-shadow: 0 0 15px rgba(255, 51, 102, 0.25);
    }
    #status {
      min-height: 24px;
      margin: 16px 0;
      color: var(--accent-color);
      font-size: 14px;
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 20px 0;
    }
    /* Sleek Result Cards */
    #result-box {
      margin-top: 20px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
      max-height: 280px;
      overflow-y: auto;
    }
    #result-box h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--accent-color);
      border-bottom: 1px solid rgba(0, 229, 255, 0.2);
      padding-bottom: 5px;
    }
    #result-box .meta-item {
      margin-bottom: 10px;
      color: var(--text-muted);
    }
    #result-box .meta-item strong {
      color: var(--text-main);
    }
    #result-box pre {
      white-space: pre-wrap;
      font-family: inherit;
      margin: 0;
      color: #b9b9c7;
    }
    /* Neon Progress Bar */
    .progress-container {
      margin: 10px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      height: 10px;
      width: 100%;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, var(--accent-color), #00ff88);
      height: 100%;
      width: 0%;
      transition: width 0.8s ease-out;
      box-shadow: 0 0 8px var(--accent-color);
    }
  </style>
</head>
<body>
  <main>
    <h1>YAMI SYSTEM</h1>
    <div class="subtitle">Cognitive & Monologue Control</div>
    
    <button data-action="trace">📊 Анализ Внутреннего Карателя</button>
    <button data-action="media_status">💾 Проверить лимит медиа</button>
    <button data-action="new_session">🔄 Начать чистую сессию</button>
    
    <div class="divider"></div>
    
    <button class="danger" data-action="full_wipe">💀 Полный сброс памяти</button>
    
    <div id="status">Панель управления готова</div>
    
    <!-- Dynamic info container -->
    <div id="result-box"></div>
  </main>
  <script>
    const app = window.Telegram?.WebApp;
    app?.ready();
    app?.expand();
    document.querySelectorAll("button[data-action]").forEach((button) => {
      button.addEventListener("click", async () => {
        const action = button.dataset.action;
        const resultBox = document.querySelector("#result-box");
        
        document.querySelector("#status").textContent = "Загрузка данных...";
        resultBox.style.display = "none";
        resultBox.innerHTML = "";
        
        // Attempt localhost request first (for Telegram Desktop on the same PC)
        const userId = app?.initDataUnsafe?.user?.id || 1872316437;
        try {
          const response = await fetch("http://127.0.0.1:18765/api", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action, user_id: userId })
          });
          if (response.ok) {
            const data = await response.json();
            document.querySelector("#status").textContent = "Команда выполнена!";
            
            // Format and display action response
            if (action === "trace") {
              if (data.has_trace) {
                resultBox.innerHTML = `
                  <h3>📊 Трассировка мыслей Ями</h3>
                  <div class="meta-item"><strong>Намерение (Intent):</strong> ${data.intent}</div>
                  <div class="meta-item"><strong>Внутренний монолог и Критик:</strong><br>
                    <pre>${data.plan}</pre>
                  </div>
                  <div class="meta-item"><strong>Ответ Ями:</strong><br>
                    <pre>${data.response}</pre>
                  </div>
                `;
              } else {
                resultBox.innerHTML = `<h3>Трассировки пока нет</h3><p>Начни общаться с Ями, чтобы увидеть логи.</p>`;
              }
              resultBox.style.display = "block";
            } else if (action === "media_status") {
              resultBox.innerHTML = `
                <h3>💾 Заполненность диска (${data.percent}%)</h3>
                <div class="progress-container">
                  <div class="progress-bar" style="width: ${data.percent}%"></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:13px; color:var(--text-muted);">
                  <span>Использовано: <strong>${data.used}</strong></span>
                  <span>Лимит: <strong>${data.limit}</strong></span>
                </div>
              `;
              resultBox.style.display = "block";
            } else {
              // Toast style success message for session wipes
              resultBox.innerHTML = `<div style="text-align:center; color:#00ff88;">✨ ${data.message}</div>`;
              resultBox.style.display = "block";
              setTimeout(() => {
                resultBox.style.display = "none";
              }, 3000);
            }
            
            setTimeout(() => {
              document.querySelector("#status").textContent = "Панель управления готова";
            }, 2000);
            return;
          }
        } catch (err) {
          console.log("Localhost API unavailable, falling back to sendData", err);
        }

        // Fallback: use standard Telegram sendData (works from keyboard buttons)
        if (!app) {
          document.querySelector("#status").textContent = "Ошибка: откройте из Telegram";
          return;
        }
        app.sendData(JSON.stringify({ action }));
      });
    });
  </script>
</body>
</html>
